<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Permite que la interfaz se adapte correctamente
       a pantallas de distintos tamaños. -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dark Moon</title>

  <!-- Hoja de estilos principal del juego. -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main>
  <!-- Pantalla de inicio principal -->
  <section
    id="mainMenu"
    class="pantalla-menu-principal"
  >
    <div class="menu-principal-capa">
      <h1 class="titulo-menu-principal">
        Dark Moon
      </h1>

      <p class="subtitulo-menu-principal">
         ---
      </p>

      <!-- Botones principales del menú -->
      <div
        id="mainMenuButtons"
        class="acciones-menu-principal"
      >
        <button
          id="newGameButton"
          class="boton-menu-principal"
          type="button"
        >
          Nuevo Juego
        </button>

        <button
          id="settingsButton"
          class="boton-menu-principal"
          type="button"
        >
          Configuración
        </button>
      </div>

      <!-- Panel simple de configuración -->
      <div
        id="settingsPlaceholder"
        class="panel-configuracion-menu oculto"
      >
        <h2>Configuración</h2>

        <p>
          Esta sección todavía no está implementada.
        </p>

        <button
          id="backToMainMenuButton"
          type="button"
        >
          Volver
        </button>
      </div>
    </div>
  </section>

  <!-- Pantalla de creación del personaje -->
  <section
    id="characterCreation"
    class="panel-creacion oculto"
  >
    <h1>Dark Moon</h1>
    <h2>Creación del personaje</h2>

    <div class="campo-formulario">
      <label for="playerName">
        Nombre
      </label>

      <input
        id="playerName"
        type="text"
        value="Aventurero"
        maxlength="20"
        autocomplete="off"
      >
    </div>

    <div class="campo-formulario">
      <label for="professionSelect">
        Profesión
      </label>

      <select id="professionSelect">
        <option>Cargando profesiones...</option>
      </select>
    </div>

    <h3>Atributos</h3>

    <div
      id="attributesContainer"
      class="contenedor-atributos"
    ></div>

    <p class="puntos-disponibles">
      Puntos disponibles:
      <span id="pointsRemaining">0</span>
    </p>

    <div class="acciones-atributos">
      <button
        id="resetAttributesButton"
        type="button"
      >
        Reiniciar atributos
      </button>

      <button
        id="randomAttributesButton"
        type="button"
      >
        Distribuir según profesión
      </button>
    </div>

    <button
      id="startGameButton"
      class="boton-principal"
      type="button"
      disabled
    >
      Comenzar aventura
    </button>

    <p
      id="creationMessage"
      class="mensaje-creacion"
      aria-live="polite"
    ></p>
  </section>

  <!-- Contenedor del juego -->
  <section
    id="gameContainer"
    class="oculto"
  >
    <h1>Dark Moon</h1>

    <p>
      Movimiento: flechas o WASD
    </p>

    <p id="status">
      Cargando partida...
    </p>

    <canvas id="gameCanvas"></canvas>

    <p id="combatLog">
      Acercate a la rata o al barril para atacarlos.
    </p>
  </section>
</main>

  <!-- game.js es un módulo porque utiliza
       importaciones y exportaciones. -->
  <script
    type="module"
    src="./game.js"
  ></script>
</body>
</html>
